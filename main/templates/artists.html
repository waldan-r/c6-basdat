{% extends 'base.html' %}


{% block content %}
    
    <div class="container mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Daftar Artist</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for artist in artists %}
            <div class="bg-white rounded-lg shadow-md p-6 border border-gray-200">
                <h2 class="text-xl font-bold text-blue-600">{{ artist.name }}</h2>
                <p class="text-gray-600 mt-2"><strong>Genre:</strong> {{ artist.genre|default:"-" }}</p>
            </div>
            {% empty %}
            <p class="text-gray-600 col-span-3">Belum ada data artist.</p>
            {% endfor %}
        </div>
    </div>
{% endblock %}
